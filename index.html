<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Ronda Griya Jatiluhur 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 pb-20">

    <!-- HEADER -->
    <header class="fixed top-0 inset-x-0 z-40 py-4 px-4 bg-slate-900/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-500/20">
                    <i data-lucide="shield" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="font-bold text-white text-lg leading-none">Ronda Harian</h1>
                    <p class="text-[10px] text-yellow-400 font-bold uppercase tracking-widest mt-1">Griya Jatiluhur 1</p>
                </div>
            </div>
            <button id="btnDownloadPDF" class="flex flex-col items-center gap-0.5 text-blue-400 active:scale-95 transition-transform">
                <div id="pdfIcon"><i data-lucide="download" class="w-5 h-5"></i></div>
                <div id="pdfLoading" class="hidden w-5 h-5 border-2 border-blue-400 border-t-transparent rounded-full animate-spin"></div>
                <span class="text-[8px] font-bold uppercase tracking-tighter">PDF</span>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 pt-24 space-y-6">
        <!-- UPCOMING CARD -->
        <div id="upcomingSection" class="relative">
            <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-3xl blur opacity-25"></div>
            <div class="relative bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-6 text-white shadow-xl">
                <div class="flex justify-between items-start mb-4">
                    <span id="todayStatus" class="px-3 py-1 rounded-full text-[10px] font-black shadow-lg">MEMUAT...</span>
                    <i data-lucide="calendar" class="opacity-70 w-5 h-5"></i>
                </div>
                <h2 id="todayDate" class="text-2xl font-bold mb-1">-</h2>
                <p class="text-blue-100/70 text-sm mb-6 font-medium">Pukul 22:00 WIB - Selesai</p>
                
                <div id="todayTeam" class="space-y-3 mb-6">
                    <!-- Petugas akan muncul di sini -->
                </div>

                <button id="btnOpenReport" class="w-full bg-white text-blue-700 py-3.5 rounded-xl font-black text-sm shadow-xl active:scale-95 transition flex items-center justify-center gap-2">
                    <i data-lucide="clipboard-list" class="w-[18px] h-[18px]"></i> ABSEN & LAPOR SEKARANG
                </button>
            </div>
        </div>

        <!-- JADWAL BERIKUTNYA -->
        <div id="nextSchedulesSection" class="space-y-3">
            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-[0.2em] flex items-center gap-2 px-2">
                <i data-lucide="clock" class="w-3.5 h-3.5"></i> Jadwal Selanjutnya
            </h3>
            <div id="nextSchedulesList" class="grid grid-cols-1 gap-3">
                <!-- Jadwal selanjutnya muncul di sini -->
            </div>
        </div>

        <!-- PENCARIAN -->
        <div class="sticky top-[80px] z-30 pt-2">
            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 w-[18px] h-[18px]"></i>
                <input 
                    id="searchInput"
                    type="text" 
                    placeholder="Cari jadwal nama Anda..." 
                    class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-4 pl-12 pr-4 text-white focus:ring-2 ring-blue-500 outline-none shadow-xl transition-all"
                />
            </div>
        </div>

        <!-- HASIL CARI -->
        <div id="scheduleContainer" class="space-y-3 pb-10">
            <!-- Item jadwal terfilter muncul di sini -->
        </div>
    </main>

    <!-- MODAL LAPORAN -->
    <div id="reportModal" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" id="modalOverlay"></div>
        <div class="relative bg-slate-900 w-full max-w-md rounded-t-3xl sm:rounded-2xl border-t border-slate-700 overflow-hidden max-h-[92vh] flex flex-col shadow-2xl animate-fade-in">
            <div class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                <div>
                    <h3 class="font-black text-xl text-white">Laporan Ronda</h3>
                    <p id="modalSubDate" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">-</p>
                </div>
                <button id="btnCloseModal" class="p-2 bg-slate-800 rounded-full text-slate-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div id="modalBody" class="p-6 overflow-y-auto space-y-8 pb-10">
                <section class="space-y-4">
                    <h4 class="text-[10px] font-black text-blue-400 uppercase tracking-widest flex items-center gap-2">
                        <div class="w-1.5 h-1.5 bg-blue-500 rounded-full"></div>
                        1. Konfirmasi Kehadiran
                    </h4>
                    <div id="attendanceList" class="grid grid-cols-1 gap-3">
                        <!-- Checkboxes petugas -->
                    </div>
                </section>

                <section class="space-y-4">
                    <h4 class="text-[10px] font-black text-blue-400 uppercase tracking-widest flex items-center gap-2">
                        <div class="w-1.5 h-1.5 bg-blue-500 rounded-full"></div>
                        2. Dokumentasi Gerbang
                    </h4>
                    <div class="grid grid-cols-3 gap-3">
                        <!-- Upload Foto -->
                        <label class="group relative aspect-square rounded-2xl bg-slate-800 border-2 border-dashed border-slate-700 flex flex-col items-center justify-center cursor-pointer overflow-hidden transition-all active:scale-95">
                            <input type="file" accept="image/*" capture="environment" class="hidden photo-input" data-gate="front">
                            <div class="photo-preview hidden absolute inset-0"></div>
                            <div class="upload-placeholder flex flex-col items-center">
                                <i data-lucide="camera" class="w-5 h-5 text-slate-500 mb-1"></i>
                                <span class="text-[9px] font-black text-slate-500 uppercase tracking-tighter">Depan</span>
                            </div>
                        </label>
                        <label class="group relative aspect-square rounded-2xl bg-slate-800 border-2 border-dashed border-slate-700 flex flex-col items-center justify-center cursor-pointer overflow-hidden transition-all active:scale-95">
                            <input type="file" accept="image/*" capture="environment" class="hidden photo-input" data-gate="side">
                            <div class="photo-preview hidden absolute inset-0"></div>
                            <div class="upload-placeholder flex flex-col items-center">
                                <i data-lucide="camera" class="w-5 h-5 text-slate-500 mb-1"></i>
                                <span class="text-[9px] font-black text-slate-500 uppercase tracking-tighter">Samping</span>
                            </div>
                        </label>
                        <label class="group relative aspect-square rounded-2xl bg-slate-800 border-2 border-dashed border-slate-700 flex flex-col items-center justify-center cursor-pointer overflow-hidden transition-all active:scale-95">
                            <input type="file" accept="image/*" capture="environment" class="hidden photo-input" data-gate="back">
                            <div class="photo-preview hidden absolute inset-0"></div>
                            <div class="upload-placeholder flex flex-col items-center">
                                <i data-lucide="camera" class="w-5 h-5 text-slate-500 mb-1"></i>
                                <span class="text-[9px] font-black text-slate-500 uppercase tracking-tighter">Belakang</span>
                            </div>
                        </label>
                    </div>
                </section>

                <button id="btnSubmitReport" class="w-full py-4 rounded-2xl font-black text-sm uppercase tracking-widest flex items-center justify-center gap-3 transition shadow-2xl bg-blue-600 hover:bg-blue-500 active:scale-[0.98] text-white shadow-blue-500/20">
                    <span id="submitLabel" class="flex items-center gap-2"><i data-lucide="send" class="w-[18px] h-[18px]"></i> Kirim & Bagikan Ke WA</span>
                    <div id="submitLoading" class="hidden w-5 h-5 border-2 border-slate-500 border-t-white rounded-full animate-spin"></div>
                </button>
            </div>

            <!-- SUCCESS STATE -->
            <div id="successState" class="hidden p-10 text-center space-y-4">
                <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto border border-green-500/50">
                    <i data-lucide="check-circle" class="w-10 h-10 text-green-500"></i>
                </div>
                <h4 class="text-2xl font-black">Berhasil!</h4>
                <p class="text-slate-400 text-sm px-10">Laporan dan dokumentasi telah tercatat. Link WhatsApp sedang dibuka...</p>
            </div>
        </div>
    </div>

    <script>
        // --- DATA & KONFIGURASI ---
        const MEMBERS = [
            "Hadi WIbowo", "Zaenal", "Edi", "Agus L. S.", "Yazid", "Akhir", 
            "Wayan", "Ariyo J. Putranto", "Ahmad Tohir", "Yosi Siregar", 
            "Adittya - Blok D", "Romi Andi", "Benni Asbullah", "Dattu H.", 
            "Agus Kristiono", "Aditya - Blok E", "Triyono", "Aris Purwanto", 
            "Dadan", "A. Harianto", "Candra", "Sabilah", "Yunus"
        ];
        const START_DATE = new Date('2025-12-26');
        const END_DATE = new Date('2026-04-30');

        let schedule = [];
        let attendanceData = {};
        let photosData = { front: null, side: null, back: null };
        let currentUser = null;

        // --- FIREBASE INIT ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'griya-jatiluhur-1';

        // --- HELPERS ---
        const formatDate = (date) => new Intl.DateTimeFormat('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).format(date);
        const getDayName = (date) => new Intl.DateTimeFormat('id-ID', { weekday: 'long' }).format(date);
        
        const getRelativeStatus = (date) => {
            const now = new Date(); now.setHours(0, 0, 0, 0);
            const target = new Date(date); target.setHours(0, 0, 0, 0);
            const diffDays = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
            if (diffDays === 0) return { label: "MALAM INI", color: "bg-red-500 animate-pulse" };
            if (diffDays === 1) return { label: "BESOK MALAM", color: "bg-orange-500" };
            if (diffDays > 1 && diffDays < 7) return { label: `${diffDays} HARI LAGI`, color: "bg-blue-500" };
            return { label: diffDays < 0 ? "SELESAI" : "MENDATANG", color: "bg-slate-600" };
        };

        function safeCreateIcons() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }

        // --- CORE LOGIC ---
        function generateSchedule() {
            let currentDate = new Date(START_DATE);
            let memberIndex = 0;
            const totalMembers = MEMBERS.length;

            schedule = [];
            while (currentDate <= END_DATE) {
                const p1 = MEMBERS[memberIndex % totalMembers];
                const p2 = MEMBERS[(memberIndex + 1) % totalMembers];
                schedule.push({
                    id: schedule.length,
                    date: new Date(currentDate),
                    team: [p1, p2]
                });
                currentDate.setDate(currentDate.getDate() + 1);
                memberIndex = (memberIndex + 2) % totalMembers;
            }
            renderUI();
        }

        function renderUI() {
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const upcoming = schedule.find(s => s.date >= today);
            
            if (upcoming) {
                const status = getRelativeStatus(upcoming.date);
                const statusEl = document.getElementById('todayStatus');
                if (statusEl) {
                    statusEl.innerText = status.label;
                    statusEl.className = `px-3 py-1 rounded-full text-[10px] font-black ${status.color} shadow-lg`;
                }
                
                const todayDateEl = document.getElementById('todayDate');
                if (todayDateEl) todayDateEl.innerText = formatDate(upcoming.date);
                
                const modalSubDateEl = document.getElementById('modalSubDate');
                if (modalSubDateEl) modalSubDateEl.innerText = formatDate(upcoming.date);

                const teamHtml = upcoming.team.map(name => `
                    <div class="flex items-center gap-3 bg-white/10 p-3 rounded-xl border border-white/10">
                        <div class="w-10 h-10 rounded-full bg-blue-400 flex items-center justify-center font-bold text-white uppercase">${name[0]}</div>
                        <div class="flex-1">
                            <p class="font-bold">${name}</p>
                        </div>
                    </div>
                `).join('');
                document.getElementById('todayTeam').innerHTML = teamHtml;

                const idx = schedule.indexOf(upcoming);
                const nexts = schedule.slice(idx + 1, idx + 4);
                const nextHtml = nexts.map(item => {
                    const rel = getRelativeStatus(item.date);
                    return `
                        <div class="bg-slate-800/40 border border-slate-700/50 p-4 rounded-2xl flex items-center gap-4">
                            <div class="w-12 h-12 bg-slate-700/50 rounded-xl flex flex-col items-center justify-center shrink-0 border border-slate-600/30">
                                <span class="text-[10px] font-bold text-slate-400 uppercase leading-none mb-0.5">${new Intl.DateTimeFormat('id-ID', {month: 'short'}).format(item.date)}</span>
                                <span class="text-lg font-bold text-white leading-none">${item.date.getDate()}</span>
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-xs font-medium text-blue-400 uppercase tracking-wide leading-none mb-1">${getDayName(item.date)}</p>
                                <p class="text-sm font-bold text-slate-200 truncate">${item.team.join(" & ")}</p>
                            </div>
                            <div class="bg-slate-700/30 px-2 py-1 rounded text-[10px] font-bold text-slate-500">${rel.label}</div>
                        </div>
                    `;
                }).join('');
                document.getElementById('nextSchedulesList').innerHTML = nextHtml;

                const attendHtml = upcoming.team.map(name => `
                    <button 
                        data-name="${name}"
                        class="btn-attend flex items-center justify-between p-4 rounded-2xl border-2 transition-all duration-200 bg-slate-800 border-slate-700 text-slate-500"
                    >
                        <div class="flex items-center gap-3">
                            <div class="initial-box w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs bg-slate-700 text-slate-500">${name[0]}</div>
                            <span class="font-bold">${name}</span>
                        </div>
                        <div class="check-icon w-6 h-6 rounded-full border-2 border-slate-600 flex items-center justify-center"></div>
                    </button>
                `).join('');
                document.getElementById('attendanceList').innerHTML = attendHtml;
                setupAttendClick();
            }
            safeCreateIcons();
        }

        function setupAttendClick() {
            document.querySelectorAll('.btn-attend').forEach(btn => {
                btn.onclick = () => {
                    const name = btn.dataset.name;
                    attendanceData[name] = !attendanceData[name];
                    const active = attendanceData[name];
                    
                    btn.classList.toggle('bg-blue-600/20', active);
                    btn.classList.toggle('border-blue-500', active);
                    btn.classList.toggle('text-white', active);
                    btn.classList.toggle('bg-slate-800', !active);
                    btn.classList.toggle('border-slate-700', !active);
                    btn.classList.toggle('text-slate-500', !active);

                    const initial = btn.querySelector('.initial-box');
                    initial.classList.toggle('bg-blue-500', active);
                    initial.classList.toggle('text-white', active);
                    initial.classList.toggle('bg-slate-700', !active);
                    initial.classList.toggle('text-slate-500', !active);

                    const check = btn.querySelector('.check-icon');
                    check.innerHTML = active ? '<i data-lucide="check" class="w-4 h-4 text-white"></i>' : '';
                    check.classList.toggle('bg-blue-500', active);
                    check.classList.toggle('border-blue-500', active);
                    check.classList.toggle('border-slate-600', !active);
                    safeCreateIcons();
                }
            });
        }

        // --- EXPORT PDF ---
        document.getElementById('btnDownloadPDF').onclick = async () => {
            const btn = document.getElementById('btnDownloadPDF');
            const icon = document.getElementById('pdfIcon');
            const loader = document.getElementById('pdfLoading');

            icon.classList.add('hidden');
            loader.classList.remove('hidden');
            btn.disabled = true;

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFontSize(18);
                doc.text("JADWAL RONDA WARGA", 105, 15, { align: "center" });
                doc.setFontSize(14);
                doc.text("Griya Jatiluhur 1", 105, 22, { align: "center" });
                doc.setFontSize(10);
                doc.text(`Periode: ${formatDate(START_DATE)} s/d ${formatDate(END_DATE)}`, 105, 28, { align: "center" });

                const tableColumn = ["No", "Hari", "Tanggal", "Petugas 1", "Petugas 2"];
                const tableRows = schedule.map((item, index) => [
                    index + 1,
                    getDayName(item.date),
                    item.date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }),
                    item.team[0],
                    item.team[1]
                ]);

                doc.autoTable({
                    head: [tableColumn],
                    body: tableRows,
                    startY: 35,
                    theme: 'striped',
                    headStyles: { fillColor: [37, 99, 235] },
                    styles: { fontSize: 9 }
                });

                doc.save("Jadwal_Ronda_Griya_Jatiluhur1.pdf");
            } catch (err) {
                console.error(err);
            } finally {
                icon.classList.remove('hidden');
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        };

        // --- PENCARIAN ---
        document.getElementById('searchInput').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const container = document.getElementById('scheduleContainer');
            const upSec = document.getElementById('upcomingSection');
            const nextSec = document.getElementById('nextSchedulesSection');

            if (!val) {
                container.innerHTML = "";
                upSec.classList.remove('hidden');
                nextSec.classList.remove('hidden');
                return;
            }

            upSec.classList.add('hidden');
            nextSec.classList.add('hidden');

            const filtered = schedule.filter(item => 
                item.team.some(m => m.toLowerCase().includes(val))
            );

            if (filtered.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-500 py-10">Warga tidak ditemukan.</p>`;
            } else {
                container.innerHTML = filtered.map(item => `
                    <div class="bg-slate-800/50 border border-slate-700 p-4 rounded-2xl flex gap-4 animate-fade-in">
                        <div class="bg-slate-700 w-14 h-14 rounded-xl flex flex-col items-center justify-center shrink-0 border border-slate-600">
                            <span class="text-[10px] font-bold text-slate-400 uppercase">${new Intl.DateTimeFormat('id-ID', {month: 'short'}).format(item.date)}</span>
                            <span class="text-xl font-bold text-white">${item.date.getDate()}</span>
                        </div>
                        <div class="flex-1">
                            <h4 class="font-bold text-blue-400 mb-1">${getDayName(item.date)}</h4>
                            <div class="text-sm text-slate-400 space-y-0.5">
                                ${item.team.map(n => `<p class="flex items-center gap-2"><i data-lucide="user" class="w-3 h-3"></i> ${n}</p>`).join('')}
                            </div>
                        </div>
                    </div>
                `).join('');
                safeCreateIcons();
            }
        };

        // --- MODAL & PELAPORAN ---
        const modal = document.getElementById('reportModal');
        const openReportBtn = document.getElementById('btnOpenReport');
        if (openReportBtn) openReportBtn.onclick = () => modal.classList.remove('hidden');
        
        const closeModalBtn = document.getElementById('btnCloseModal');
        if (closeModalBtn) closeModalBtn.onclick = () => modal.classList.add('hidden');
        
        const modalOverlay = document.getElementById('modalOverlay');
        if (modalOverlay) modalOverlay.onclick = () => modal.classList.add('hidden');

        // Preview Foto
        document.querySelectorAll('.photo-input').forEach(input => {
            input.onchange = (e) => {
                const file = e.target.files[0];
                const gate = input.dataset.gate;
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        photosData[gate] = ev.target.result;
                        const preview = input.parentElement.querySelector('.photo-preview');
                        const placeholder = input.parentElement.querySelector('.upload-placeholder');
                        preview.innerHTML = `<img src="${ev.target.result}" class="w-full h-full object-cover">
                                             <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="camera" class="text-white w-6 h-6"></i></div>
                                             <div class="absolute top-1 right-1 bg-green-500 rounded-full p-0.5 shadow-lg"><i data-lucide="check" class="text-white w-2.5 h-2.5"></i></div>`;
                        preview.classList.remove('hidden');
                        placeholder.classList.add('hidden');
                        safeCreateIcons();
                    };
                    reader.readAsDataURL(file);
                }
            };
        });

        document.getElementById('btnSubmitReport').onclick = async () => {
            if (!currentUser) {
                console.error("Auth belum siap");
                return;
            }

            const btn = document.getElementById('btnSubmitReport');
            const label = document.getElementById('submitLabel');
            const loader = document.getElementById('submitLoading');
            const success = document.getElementById('successState');
            const body = document.getElementById('modalBody');

            label.classList.add('hidden');
            loader.classList.remove('hidden');
            btn.disabled = true;

            try {
                const today = new Date(); today.setHours(0, 0, 0, 0);
                const current = schedule.find(s => s.date.toDateString() === today.toDateString()) || schedule.find(s => s.date >= today);

                const report = {
                    dateLabel: formatDate(current.date),
                    attendance: current.team.map(n => ({ name: n, status: attendanceData[n] ? 'Hadir' : 'Absen' })),
                    status: "Aman",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };

                // Path sesuai aturan Canvas: /artifacts/{appId}/public/data/{collectionName}
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('reports').add(report);

                // Format WhatsApp
                const attendTxt = current.team.map(n => `- ${n} (${attendanceData[n] ? '✅ Hadir' : '❌ Absen'})`).join('\n');
                const photoTxt = `📸 Dokumentasi: Depan(${photosData.front ? '✅' : '❌'}), Samping(${photosData.side ? '✅' : '❌'}), Belakang(${photosData.back ? '✅' : '❌'})`;
                const waMsg = `*LAPORAN RONDA GRIYA JATILUHUR 1*\n📅 ${formatDate(current.date)}\n\n*KEHADIRAN:*\n${attendTxt}\n\n${photoTxt}\n\nSituasi aman terkendali. 👮‍♂️`;
                
                window.open(`https://wa.me/?text=${encodeURIComponent(waMsg)}`, '_blank');

                body.classList.add('hidden');
                success.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    body.classList.remove('hidden');
                    success.classList.add('hidden');
                    label.classList.remove('hidden');
                    loader.classList.add('hidden');
                    btn.disabled = false;
                }, 3000);

            } catch (err) {
                console.error("Firebase Error:", err);
                btn.disabled = false;
                label.classList.remove('hidden');
                loader.classList.add('hidden');
            }
        };

        // --- INISIALISASI ---
        window.addEventListener('load', async () => {
            try {
                // RULE 3: Auth Before Queries
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }

                auth.onAuthStateChanged((user) => {
                    currentUser = user;
                    if (user) {
                        generateSchedule();
                        safeCreateIcons();
                    }
                });
            } catch (error) {
                console.error("Auth Initialization Failed:", error);
            }
        });
    </script>
</body>
</html>
