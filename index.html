<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ronda Malam - Griya Jatiluhur 1</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-grad { background: linear-gradient(135deg, #1d4ed8 0%, #4338ca 100%); }
        input[type="file"] { display: none; }
        .tap-effect:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
        const SCRIPT_URL = "https://docs.google.com/spreadsheets/d/1Fo_cTlgfhrDSKXMXcxR5lb3VhjVkjKlSWEfTZWWLi1s/edit?hl=id&pli=1&gid=0#gid=0";

        const MEMBERS = ["Hadi WIbowo", "Zaenal", "Edi", "Agus L. S.", "Yazid", "Akhir", "Wayan", "Ariyo J. Putranto", "Ahmad Tohir", "Yosi Siregar", "Adittya - Blok D", "Romi Andi", "Benni Asbullah", "Dattu H.", "Agus Kristiono", "Aditya - Blok E", "Triyono", "Aris Purwanto", "Dadan", "A. Harianto", "Candra", "Sabilah", "Yunus"];
        const START_DATE = new Date('2026-03-07'); 

        const App = () => {
            const [schedule, setSchedule] = useState([]);
            const [attendance, setAttendance] = useState({});
            const [hasPhotos, setHasPhotos] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                const generated = [];
                let curr = new Date(START_DATE);
                let idx = 0;
                while (generated.length < 45) {
                    if (curr.getDay() === 6) {
                        generated.push({ id: curr.getTime(), date: new Date(curr), team: [MEMBERS[idx % MEMBERS.length], MEMBERS[(idx + 1) % MEMBERS.length]] });
                        idx = (idx + 2) % MEMBERS.length;
                    }
                    curr.setDate(curr.getDate() + 1);
                }
                setSchedule(generated);
            }, []);

            const todayTask = useMemo(() => {
                const now = new Date();
                now.setHours(0,0,0,0);
                return schedule.find(s => s.date >= now) || schedule[0];
            }, [schedule]);

            const formatDate = (d) => new Intl.DateTimeFormat('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).format(d);

            const handleSubmit = () => {
                setIsSaving(true);
                const now = new Date();
                const jam = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + " WIB";
                const tgl = formatDate(todayTask.date);
                
                const p1 = todayTask.team[0], p2 = todayTask.team[1];
                const s1 = attendance[p1] ? "✅ Hadir" : "❌ Absen";
                const s2 = attendance[p2] ? "✅ Hadir" : "❌ Absen";
                const fotoStr = hasPhotos ? "Ada Foto" : "Tanpa Foto";

                // Kirim ke Google Sheet (Metode No-Cors yang Terbukti Berhasil)
                const params = new URLSearchParams();
                params.append('tanggal', tgl);
                params.append('waktu', jam);
                params.append('petugas1', p1);
                params.append('status1', s1);
                params.append('petugas2', p2);
                params.append('status2', s2);
                params.append('foto_status', fotoStr);

                fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: params });

                // Redirect ke WA setelah jeda singkat
                setTimeout(() => {
                    const waMsg = `*LAPORAN RONDA GRIYA JATILUHUR 1*\n📅 ${tgl}\n⏰ Waktu Lapor: ${jam}\n\n*STATUS KEHADIRAN:*\n- ${p1} (${s1})\n- ${p2} (${s2})\n\n*DOKUMENTASI:*\n${hasPhotos ? "📸 Foto area telah diambil." : "⚠️ Foto menyusul."}\n\nLaporan selesai. Situasi aman terkendali. 👮‍♂️`;
                    window.open(`https://wa.me/?text=${encodeURIComponent(waMsg)}`, '_blank');
                    setIsSaving(false);
                }, 1000);
            };

            const downloadJadwal = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.text("JADWAL RONDA GJ1 - 2026", 105, 15, { align: "center" });
                const data = schedule.map((s, i) => [i + 1, formatDate(s.date), s.team.join(" & ")]);
                doc.autoTable({ head: [['No', 'Tanggal', 'Petugas']], body: data, startY: 25 });
                doc.save("Jadwal_Ronda_GJ1.pdf");
            };

            if (schedule.length === 0) return null;

            return (
                <div className="max-w-md mx-auto min-h-screen p-5 flex flex-col gap-6 pb-20">
                    <header>
                        <h1 className="text-2xl font-bold tracking-tight">Laporan Ronda GJ1</h1>
                        <p className="text-blue-400 text-xs font-bold uppercase tracking-widest">Aman Terkendali 👮‍♂️</p>
                    </header>

                    <div className="hero-grad rounded-[32px] p-6 shadow-2xl relative overflow-hidden">
                        <div className="relative z-10">
                            <span className="bg-white/20 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">Tugas Malam Minggu</span>
                            <h2 className="text-xl font-bold mt-3 mb-6">{formatDate(todayTask.date)}</h2>
                            
                            <div className="space-y-3 mb-8">
                                {todayTask.team.map(name => (
                                    <div key={name} onClick={() => setAttendance(p => ({...p, [name]: !p[name]}))}
                                        className={`flex items-center justify-between p-5 rounded-2xl cursor-pointer tap-effect transition-all ${attendance[name] ? 'bg-white text-blue-800 shadow-xl' : 'bg-black/20 border border-white/10'}`}>
                                        <span className="font-bold">{name}</span>
                                        <span className="text-xl">{attendance[name] ? "✅" : "⭕"}</span>
                                    </div>
                                ))}
                            </div>

                            <label className="block mb-8 cursor-pointer tap-effect">
                                <div className={`p-5 rounded-2xl border-2 border-dashed flex items-center justify-center gap-3 transition-all ${hasPhotos ? 'bg-green-500/20 border-green-400 text-green-400' : 'bg-black/20 border-white/20'}`}>
                                    <span className="text-xl">{hasPhotos ? "✅" : "📸"}</span>
                                    <span className="font-bold text-sm uppercase">{hasPhotos ? "Foto Terpilih" : "Ambil Foto Lokasi"}</span>
                                </div>
                                <input type="file" accept="image/*" multiple onChange={() => setHasPhotos(true)} />
                            </label>

                            <button onClick={handleSubmit} disabled={isSaving}
                                className="w-full bg-white text-blue-700 py-5 rounded-2xl font-bold text-lg shadow-xl tap-effect disabled:opacity-50">
                                {isSaving ? "Menyimpan Data..." : "Kirim Absen & Lapor WA"}
                            </button>
                        </div>
                    </div>

                    <button onClick={downloadJadwal} className="w-full glass py-4 rounded-2xl font-bold text-sm text-slate-300 flex items-center justify-center gap-3 tap-effect">
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                        Download Jadwal 1 Tahun
                    </button>

                    <footer className="mt-auto text-center opacity-30">
                        <p className="text-[10px] font-bold uppercase tracking-[0.3em]">Griya Jatiluhur 1 © 2026</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
