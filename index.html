<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ronda Malam Minggu - GJ1</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #e2e8f0; margin: 0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-gradient { background: linear-gradient(135deg, #1e40af 0%, #4f46e5 100%); }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // PASTE URL WEB APP ANDA DI SINI
        const SCRIPT_URL = "https://ronda-malam-psi.vercel.app";

        const MEMBERS = ["Hadi WIbowo", "Zaenal", "Edi", "Agus L. S.", "Yazid", "Akhir", "Wayan", "Ariyo J. Putranto", "Ahmad Tohir", "Yosi Siregar", "Adittya - Blok D", "Romi Andi", "Benni Asbullah", "Dattu H.", "Agus Kristiono", "Aditya - Blok E", "Triyono", "Aris Purwanto", "Dadan", "A. Harianto", "Candra", "Sabilah", "Yunus"];
        const START_DATE = new Date('2026-03-07'); 
        const END_DATE = new Date('2026-12-30');

        const App = () => {
            const [schedule, setSchedule] = useState([]);
            const [attendance, setAttendance] = useState({});
            const [photos, setPhotos] = useState({ depan: false, samping: false, belakang: false });
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                const generated = [];
                let curr = new Date(START_DATE);
                let idx = 0;
                while (curr <= END_DATE) {
                    if (curr.getDay() === 6) {
                        generated.push({
                            id: curr.getTime(),
                            date: new Date(curr),
                            team: [MEMBERS[idx % MEMBERS.length], MEMBERS[(idx + 1) % MEMBERS.length]]
                        });
                        idx = (idx + 2) % MEMBERS.length;
                    }
                    curr.setDate(curr.getDate() + 1);
                }
                setSchedule(generated);
            }, []);

            const formatDate = (d) => new Intl.DateTimeFormat('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).format(d);

            const todayTask = useMemo(() => {
                const now = new Date();
                now.setHours(0,0,0,0);
                return schedule.find(s => s.date >= now) || schedule[0];
            }, [schedule]);

            const nextWeekTask = useMemo(() => {
                if (!todayTask) return null;
                const idx = schedule.findIndex(s => s.id === todayTask.id);
                return schedule[idx + 1] || null;
            }, [schedule, todayTask]);

            const handleSend = async () => {
                if (!photos.depan || !photos.samping || !photos.belakang) {
                    alert("⚠️ Harap ambil foto di 3 lokasi pintu!");
                    return;
                }

                setLoading(true);
                const now = new Date();
                const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false });
                
                const tgl = formatDate(todayTask.date);
                const wkt = timeStr + " WIB";
                const p1 = todayTask.team[0];
                const s1 = attendance[p1] ? "Hadir" : "Absen";
                const p2 = todayTask.team[1];
                const s2 = attendance[p2] ? "Hadir" : "Absen";

                // Gunakan URLSearchParams untuk kompatibilitas no-cors maksimal
                const params = new URLSearchParams();
                params.append('tanggal', tgl);
                params.append('waktu', wkt);
                params.append('petugas1', p1);
                params.append('status1', s1);
                params.append('petugas2', p2);
                params.append('status2', s2);

                try {
                    // Kirim ke Google Sheets
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: params
                    });

                    // Buka WhatsApp setelah jeda kecil
                    setTimeout(() => {
                        const waText = `*LAPORAN RONDA GRIYA JATILUHUR 1*\n` +
                                       `📅 ${tgl}\n` +
                                       `⏰ Waktu Lapor: ${wkt}\n\n` +
                                       `*STATUS KEHADIRAN:*\n` +
                                       `- ${p1} (${s1})\n` +
                                       `- ${p2} (${s2})\n\n` +
                                       `*DOKUMENTASI:*\n📸 Foto Pintu Depan, Samping, & Belakang telah diambil.\n\n` +
                                       `Laporan selesai. Situasi aman terkendali. 👮‍♂️`;

                        window.open(`https://wa.me/?text=${encodeURIComponent(waText)}`, '_blank');
                        setLoading(false);
                    }, 800);

                } catch (e) {
                    alert("Gagal koneksi.");
                    setLoading(false);
                }
            };

            const downloadPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.text("JADWAL RONDA GJ1 2026", 105, 15, { align: "center" });
                const rows = schedule.map((s, i) => [i + 1, formatDate(s.date), s.team.join(" & ")]);
                doc.autoTable({ head: [['No', 'Tanggal', 'Petugas']], body: rows, startY: 25 });
                doc.save("Jadwal_Ronda_2026.pdf");
            };

            if (schedule.length === 0) return null;

            return (
                <div className="max-w-md mx-auto p-4 space-y-6">
                    <header className="py-4">
                        <h1 className="text-2xl font-bold text-white tracking-tight">Ronda Malam Minggu</h1>
                        <p className="text-blue-400 text-xs font-bold uppercase tracking-widest">Griya Jatiluhur 1</p>
                    </header>

                    <div className="hero-gradient rounded-[32px] p-6 shadow-2xl">
                        <h2 className="text-white font-bold text-lg mb-1">{formatDate(todayTask.date)}</h2>
                        <p className="text-blue-100 text-[11px] mb-6 opacity-80 italic">Absen dan ambil foto lokasi:</p>
                        
                        <div className="space-y-3 mb-6">
                            {todayTask.team.map(name => (
                                <div key={name} onClick={() => setAttendance(p => ({...p, [name]: !p[name]}))}
                                    className={`flex items-center justify-between p-4 rounded-2xl cursor-pointer transition-all ${attendance[name] ? 'bg-white text-blue-700 shadow-lg scale-105' : 'bg-black/20 text-white border border-white/10'}`}>
                                    <span className="font-bold">{name}</span>
                                    <span>{attendance[name] ? "✅" : "⭕"}</span>
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-3 gap-3 mb-6">
                            {['depan', 'samping', 'belakang'].map(loc => (
                                <label key={loc} className="flex flex-col items-center gap-2">
                                    <div className={`w-full aspect-square rounded-2xl border-2 border-dashed flex items-center justify-center transition-all ${photos[loc] ? 'bg-green-500/30 border-green-400' : 'bg-black/20 border-white/20'}`}>
                                        <svg className={`w-6 h-6 ${photos[loc] ? 'text-green-400' : 'text-white/40'}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/></svg>
                                    </div>
                                    <span className="text-[9px] font-bold uppercase text-white/50">Pintu {loc}</span>
                                    <input type="file" accept="image/*" capture="environment" onChange={() => setPhotos(p => ({...p, [loc]: true}))} />
                                </label>
                            ))}
                        </div>

                        <button onClick={handleSend} disabled={loading}
                            className="w-full bg-white text-blue-700 py-4 rounded-2xl font-bold shadow-xl disabled:opacity-50 active:scale-95 transition-all">
                            {loading ? "Menyimpan Data..." : "Kirim Absen & Lapor WA"}
                        </button>
                    </div>

                    {nextWeekTask && (
                        <div className="glass-card p-4 rounded-2xl flex justify-between items-center opacity-70">
                            <div>
                                <p className="text-[10px] text-blue-400 font-bold mb-1 uppercase tracking-wider">Sabtu Depan</p>
                                <p className="text-white text-sm font-semibold">{nextWeekTask.team.join(" & ")}</p>
                            </div>
                        </div>
                    )}

                    <button onClick={downloadPDF} className="w-full py-4 text-xs text-slate-500 font-bold uppercase tracking-widest hover:text-white transition-colors">
                        Download Jadwal 1 Tahun
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
