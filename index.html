<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Ronda GJ1</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-grad { background: linear-gradient(135deg, #1d4ed8 0%, #4338ca 100%); }
        input[type="file"] { display: none; }
        .tap-effect:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- GANTI URL DI BAWAH INI ---
        const SCRIPT_URL = "URL_SCRIPT_SPREADSHEET_ANDA"; 

        const MEMBERS = ["Hadi WIbowo", "Zaenal", "Edi", "Agus L. S.", "Yazid", "Akhir", "Wayan", "Ariyo J. Putranto", "Ahmad Tohir", "Yosi Siregar", "Adittya - Blok D", "Romi Andi", "Benni Asbullah", "Dattu H.", "Agus Kristiono", "Aditya - Blok E", "Triyono", "Aris Purwanto", "Dadan", "A. Harianto", "Candra", "Sabilah", "Yunus"];
        const START_DATE = new Date('2026-03-07'); 

        const App = () => {
            const [attendance, setAttendance] = useState({});
            const [photos, setPhotos] = useState({ depan: false, samping: false, belakang: false });
            const [isSaving, setIsSaving] = useState(false);

            const schedule = useMemo(() => {
                const list = [];
                let curr = new Date(START_DATE);
                let idx = 0;
                while (list.length < 52) {
                    if (curr.getDay() === 6) {
                        list.push({ date: new Date(curr), team: [MEMBERS[idx % MEMBERS.length], MEMBERS[(idx + 1) % MEMBERS.length]] });
                        idx = (idx + 2) % MEMBERS.length;
                    }
                    curr.setDate(curr.getDate() + 1);
                }
                return list;
            }, []);

            const todayTask = useMemo(() => {
                const now = new Date();
                now.setHours(0,0,0,0);
                return schedule.find(s => s.date >= now) || schedule[0];
            }, [schedule]);

            const nextWeekTask = useMemo(() => {
                const idx = schedule.findIndex(s => s.date.getTime() === todayTask.date.getTime());
                return schedule[idx + 1];
            }, [schedule, todayTask]);

            const formatDate = (d) => new Intl.DateTimeFormat('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).format(d);

            const handleReport = () => {
                setIsSaving(true);
                const now = new Date();
                const jam = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + " WIB";
                const tgl = formatDate(todayTask.date);
                
                const p1 = todayTask.team[0], p2 = todayTask.team[1];
                const s1 = attendance[p1] ? "✅ Hadir" : "❌ Absen";
                const s2 = attendance[p2] ? "✅ Hadir" : "❌ Absen";

                const params = new URLSearchParams();
                params.append('tanggal', tgl);
                params.append('waktu', jam);
                params.append('petugas1', p1);
                params.append('status1', s1);
                params.append('petugas2', p2);
                params.append('status2', s2);

                // Kirim ke Spreadsheet
                fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: params });

                // Langsung buka WhatsApp
                setTimeout(() => {
                    const waMsg = `*LAPORAN RONDA GRIYA JATILUHUR 1*\n📅 ${tgl}\n⏰ Lapor: ${jam}\n\n*STATUS KEHADIRAN:*\n- ${p1} (${s1})\n- ${p2} (${s2})\n\n*DOKUMENTASI:*\n📸 Gerbang Depan: OK\n📸 Gerbang Samping: OK\n📸 Gerbang Belakang: OK\n\nSituasi aman terkendali. 👮‍♂️`;
                    window.open(`https://wa.me/?text=${encodeURIComponent(waMsg)}`, '_blank');
                    setIsSaving(false);
                }, 1000);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen p-5 flex flex-col gap-6">
                    <header>
                        <h1 className="text-2xl font-bold text-white">Laporan Ronda GJ1</h1>
                        <p className="text-blue-400 text-xs font-bold uppercase tracking-widest">Aman Terkendali</p>
                    </header>

                    {/* AREA ABSEN & FOTO */}
                    <div className="hero-grad rounded-[32px] p-6 shadow-2xl space-y-6">
                        <div>
                            <span className="bg-white/20 text-[10px] font-bold px-3 py-1 rounded-full uppercase">Malam Ini</span>
                            <h2 className="text-xl font-bold mt-2 text-white">{formatDate(todayTask.date)}</h2>
                        </div>
                        
                        <div className="space-y-3">
                            {todayTask.team.map(name => (
                                <div key={name} onClick={() => setAttendance(p => ({...p, [name]: !p[name]}))}
                                    className={`flex items-center justify-between p-4 rounded-2xl cursor-pointer tap-effect transition-all ${attendance[name] ? 'bg-white text-blue-800 shadow-xl scale-[1.02]' : 'bg-black/20 border border-white/10'}`}>
                                    <span className="font-bold">{name}</span>
                                    <span className="text-sm font-bold">{attendance[name] ? "HADIR ✅" : "ABSEN ⭕"}</span>
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-3 gap-3">
                            {['depan', 'samping', 'belakang'].map(loc => (
                                <label key={loc} className="flex flex-col items-center gap-2 cursor-pointer tap-effect">
                                    <div className={`w-full aspect-square rounded-2xl border-2 border-dashed flex items-center justify-center transition-all ${photos[loc] ? 'bg-green-500/30 border-green-400 text-green-400' : 'bg-black/20 border-white/20 text-white/40'}`}>
                                        <span className="text-xl">{photos[loc] ? "✅" : "📸"}</span>
                                    </div>
                                    <span className="text-[9px] font-bold uppercase text-white/50">Pintu {loc}</span>
                                    <input type="file" accept="image/*" onChange={() => setPhotos(p => ({...p, [loc]: true}))} />
                                </label>
                            ))}
                        </div>

                        <button onClick={handleReport} disabled={isSaving}
                            className="w-full bg-white text-blue-700 py-5 rounded-2xl font-bold text-lg shadow-xl tap-effect disabled:opacity-50">
                            {isSaving ? "Mencatat..." : "Kirim Absen & WA"}
                        </button>
                    </div>

                    {/* JADWAL PEKAN DEPAN */}
                    <div className="space-y-3">
                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Persiapan Pekan Depan</p>
                        <div className="glass p-5 rounded-[24px] flex justify-between items-center opacity-80">
                            <div>
                                <p className="text-[10px] text-blue-400 font-bold mb-1 uppercase">{formatDate(nextWeekTask.date)}</p>
                                <p className="text-white text-sm font-semibold">{nextWeekTask.team.join(" & ")}</p>
                            </div>
                            <span className="bg-slate-800 text-[9px] font-bold text-slate-400 px-3 py-1 rounded-full">Next</span>
                        </div>
                    </div>

                    <footer className="text-center opacity-30 mt-auto pb-4">
                        <p className="text-[9px] font-bold uppercase tracking-[0.3em]">Otomasi Laporan Griya Jatiluhur 1</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
