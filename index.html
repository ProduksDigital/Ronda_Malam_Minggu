<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jadwal Ronda Mingguan (Malam Minggu) - Griya Jatiluhur 1</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .glass-panel { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hero-gradient { background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const MEMBERS = [
            "Hadi WIbowo", "Zaenal", "Edi", "Agus L. S.", "Yazid", 
            "Akhir", "Wayan", "Ariyo J. Putranto", "Ahmad Tohir", 
            "Yosi Siregar", "Adittya - Blok D", "Romi Andi", 
            "Benni Asbullah", "Dattu H.", "Agus Kristiono", 
            "Aditya - Blok E", "Triyono", "Aris Purwanto", 
            "Dadan", "A. Harianto", "Candra", "Sabilah", "Yunus"
        ];

        // KONFIGURASI BARU: Mingguan (Setiap Sabtu/Malam Minggu)
        const START_DATE = new Date('2026-03-07'); // Sabtu pertama
        const END_DATE = new Date('2027-01-31');   // Sampai Januari 2027

        const App = () => {
            const [schedule, setSchedule] = useState([]);
            const [searchTerm, setSearchTerm] = useState("");

            useEffect(() => {
                const generated = [];
                let currentDate = new Date(START_DATE);
                let memberIndex = 0;

                while (currentDate <= END_DATE) {
                    const p1 = MEMBERS[memberIndex % MEMBERS.length];
                    const p2 = MEMBERS[(memberIndex + 1) % MEMBERS.length];

                    generated.push({
                        id: currentDate.getTime(),
                        date: new Date(currentDate),
                        team: [p1, p2]
                    });

                    // LONCAT 7 HARI (Hanya Malam Minggu)
                    currentDate.setDate(currentDate.getDate() + 7);
                    // Geser index 2 orang untuk jadwal minggu depan
                    memberIndex = (memberIndex + 2) % MEMBERS.length;
                }
                setSchedule(generated);
            }, []);

            const formatDate = (date) => new Intl.DateTimeFormat('id-ID', { 
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
            }).format(date);

            const upcomingSchedule = useMemo(() => {
                const today = new Date();
                today.setHours(0,0,0,0);
                return schedule.find(s => s.date >= today) || schedule[0];
            }, [schedule]);

            const filteredSchedule = useMemo(() => {
                if (!searchTerm) return schedule.slice(0, 12); 
                return schedule.filter(item => 
                    item.team.some(m => m.toLowerCase().includes(searchTerm.toLowerCase())) ||
                    formatDate(item.date).toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [schedule, searchTerm]);

            const sendWA = (item) => {
                const text = `*LAPORAN RONDA MALAM MINGGU*\n📍 Griya Jatiluhur 1\n📅 ${formatDate(item.date)}\n\n*Petugas:* \n1. ${item.team[0]}\n2. ${item.team[1]}\n\nStatus: Aman Terkendali ✅`;
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="fixed top-0 inset-x-0 z-40 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 py-4">
                        <div className="max-w-md mx-auto px-4">
                            <h1 className="font-bold text-white text-center">Jadwal Ronda Malam Minggu</h1>
                            <p className="text-[10px] text-blue-400 text-center uppercase tracking-widest font-bold">Maret 2026 - Januari 2027</p>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto px-4 pt-24 space-y-6">
                        {upcomingSchedule && (
                            <div className="hero-gradient rounded-3xl p-6 shadow-xl">
                                <span className="bg-white/20 text-white text-[10px] font-bold px-3 py-1 rounded-full">SABTU INI / TERDEKAT</span>
                                <h2 className="text-xl font-bold text-white mt-3 mb-4">{formatDate(upcomingSchedule.date)}</h2>
                                <div className="grid grid-cols-2 gap-3">
                                    {upcomingSchedule.team.map((name, i) => (
                                        <div key={i} className="bg-white/10 backdrop-blur-md border border-white/20 p-3 rounded-2xl">
                                            <p className="text-[10px] text-blue-200">Petugas {i+1}</p>
                                            <p className="font-bold text-white truncate">{name}</p>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => sendWA(upcomingSchedule)} className="w-full mt-5 bg-white text-blue-600 py-3 rounded-xl font-bold text-sm shadow-lg">
                                    Kirim Laporan WA
                                </button>
                            </div>
                        )}

                        <div className="relative">
                            <input 
                                type="text" 
                                placeholder="Cari nama..." 
                                className="w-full bg-slate-800 border border-slate-700 rounded-2xl py-4 pl-12 pr-4 text-white outline-none"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                            <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        </div>

                        <div className="space-y-3">
                            <h3 className="text-slate-400 text-xs font-bold px-1 uppercase tracking-wider">Daftar Jadwal Pekanan</h3>
                            {filteredSchedule.map((item) => (
                                <div key={item.id} className="glass-panel p-4 rounded-2xl flex justify-between items-center">
                                    <div className="flex-1">
                                        <p className="text-[10px] text-blue-400 font-bold mb-1">{formatDate(item.date).toUpperCase()}</p>
                                        <div className="flex gap-2">
                                            <span className="text-sm font-medium text-white">{item.team[0]}</span>
                                            <span className="text-slate-600">&</span>
                                            <span className="text-sm font-medium text-white">{item.team[1]}</span>
                                        </div>
                                    </div>
                                    <button onClick={() => sendWA(item)} className="p-2 text-slate-500 hover:text-green-400">
                                        <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.432 5.631 1.433h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                                    </button>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
